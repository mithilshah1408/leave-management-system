services:

  db:
    image: postgres:15
    container_name: lms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: leave_management_db
      POSTGRES_USER: ${DB_USER:-lmsuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lmspassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-lmsuser}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/leave_management_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-lmsuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-lmspassword}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-create}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
